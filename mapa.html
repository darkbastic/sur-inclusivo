<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa | Sur-Inclusivo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="navbar-brand">
        <span style="font-size: 1.5rem;">🎓</span> Sur-Inclusivo
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Inicio</a></li>
        <li><a href="beneficios.html" class="nav-link">Beneficios</a></li>
        <li><a href="apoyo.html" class="nav-link">Apoyo</a></li>
        <li><a href="mapa.html" class="nav-link">Mapa</a></li>
      </ul>
      <div class="nav-actions">
        <button id="theme-btn" class="btn-theme">🌙</button>
        <button id="menu-btn" class="menu-btn">☰</button>
      </div>
    </div>
  </nav>

  <header class="page-header fade-in">
    <div class="container">
      <h1 class="page-title">Mapa de la Sede</h1>
      <p class="page-subtitle">Localiza los puntos clave de INACAP Santiago Sur</p>
    </div>
  </header>

  <main class="container">
    <div class="map-container fade-in">
      <div class="map-visual">
        <!-- Background grid/simulated map -->
        <div style="position: absolute; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); opacity: 0.1;">
          <div style="border: 0.5px solid var(--text-primary);"></div>
          <!-- Repeat boxes... (omitted for brevity in visualization) -->
        </div>
        
        <!-- Interactive Points -->
        <div class="map-point" style="top: 20%; left: 30%;" data-label="Biblioteca 📚"></div>
        <div class="map-point" style="top: 40%; left: 60%;" data-label="Bienestar Estudiantil 🧠"></div>
        <div class="map-point" style="top: 70%; left: 20%;" data-label="Casino 🍽️"></div>
        <div class="map-point" style="top: 15%; left: 80%;" data-label="Enfermería 🏥"></div>
        <div class="map-point" style="top: 60%; left: 75%;" data-label="Salas Pabellón A ✍️"></div>
        <div class="map-point" style="top: 85%; left: 50%;" data-label="Estacionamiento 🅿️"></div>

        <div style="position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.5); color: white; padding: 10px; border-radius: 6px; font-size: 0.8rem;">
          💡 Haz clic en los puntos para identificar la ubicación
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>INACAP Santiago Sur &copy; 2026 — Proyecto Sur-Inclusivo</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
